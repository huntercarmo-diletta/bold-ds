<title>Mapa de dependências · Conta BOLD DS</title>
<style>
  :root{
    --bg:#F5F5F8; --panel:#FFFFFF; --ink:#1A1B21; --muted:#71747F;
    --line:#E4E4EA; --ghost:rgba(120,124,138,.13);
    --tokens:#5A5D67; --atoms:#2F6BFF; --molecules:#0FA152; --organisms:#F0870F; --motion:#8B5CF6;
    --tokens-soft:rgba(90,93,103,.10); --atoms-soft:rgba(47,107,255,.10);
    --molecules-soft:rgba(15,161,82,.11); --organisms-soft:rgba(240,135,15,.12); --motion-soft:rgba(139,92,246,.11);
    --font:"Poppins",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0D0E13; --panel:#16171E; --ink:#ECEDF1; --muted:#898C99;
      --line:#24252E; --ghost:rgba(150,154,168,.12);
      --tokens:#9B9FAC; --atoms:#6D9BFF; --molecules:#3ED08A; --organisms:#FCA94B; --motion:#B39BFF;
      --tokens-soft:rgba(155,159,172,.12); --atoms-soft:rgba(109,155,255,.13);
      --molecules-soft:rgba(62,208,138,.13); --organisms-soft:rgba(252,169,75,.14); --motion-soft:rgba(179,155,255,.14);
    }
  }
  :root[data-theme="dark"]{
    --bg:#0D0E13; --panel:#16171E; --ink:#ECEDF1; --muted:#898C99;
    --line:#24252E; --ghost:rgba(150,154,168,.12);
    --tokens:#9B9FAC; --atoms:#6D9BFF; --molecules:#3ED08A; --organisms:#FCA94B; --motion:#B39BFF;
    --tokens-soft:rgba(155,159,172,.12); --atoms-soft:rgba(109,155,255,.13);
    --molecules-soft:rgba(62,208,138,.13); --organisms-soft:rgba(252,169,75,.14); --motion-soft:rgba(179,155,255,.14);
  }
  :root[data-theme="light"]{
    --bg:#F5F5F8; --panel:#FFFFFF; --ink:#1A1B21; --muted:#71747F;
    --line:#E4E4EA; --ghost:rgba(120,124,138,.13);
    --tokens:#5A5D67; --atoms:#2F6BFF; --molecules:#0FA152; --organisms:#F0870F; --motion:#8B5CF6;
    --tokens-soft:rgba(90,93,103,.10); --atoms-soft:rgba(47,107,255,.10);
    --molecules-soft:rgba(15,161,82,.11); --organisms-soft:rgba(240,135,15,.12); --motion-soft:rgba(139,92,246,.11);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased}
  header{position:sticky;top:0;z-index:5;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:16px 24px;display:flex;flex-wrap:wrap;gap:12px 24px;align-items:baseline;justify-content:space-between}
  h1{font-size:16px;font-weight:700;margin:0;letter-spacing:-.01em}
  h1 span{color:var(--muted);font-weight:500}
  #status{margin:4px 0 0;font-size:12.5px;color:var(--muted);max-width:60ch}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;font-weight:600;letter-spacing:.06em}
  .legend b{display:inline-flex;align-items:center;gap:6px;font-weight:600;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%}
  .board{position:relative;display:flex;gap:clamp(28px,7vw,110px);padding:34px 40px 80px;min-width:max-content}
  .lane{display:flex;flex-direction:column;gap:9px;z-index:1;min-width:118px}
  .lane-head{font-size:11px;font-weight:700;letter-spacing:.1em;margin-bottom:8px;text-transform:uppercase}
  .node{appearance:none;font-family:inherit;cursor:pointer;border-radius:999px;padding:8px 15px;font-size:12.5px;font-weight:600;
    background:var(--panel);white-space:nowrap;transition:opacity .18s,transform .12s,background .18s,color .18s;text-align:center}
  .node:focus-visible{outline:2px solid var(--atoms);outline-offset:2px}
  svg.wires{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:visible}
  path.wire{fill:none;stroke:var(--ghost);stroke-width:1.1;transition:stroke .18s,stroke-width .18s,opacity .18s}
  /* layer paint */
  .l-tokens{--c:var(--tokens);--cs:var(--tokens-soft)}
  .l-atoms{--c:var(--atoms);--cs:var(--atoms-soft)}
  .l-molecules{--c:var(--molecules);--cs:var(--molecules-soft)}
  .l-organisms{--c:var(--organisms);--cs:var(--organisms-soft)}
  .l-motion{--c:var(--motion);--cs:var(--motion-soft)}
  .node{color:var(--c);border:1.5px solid color-mix(in srgb,var(--c) 34%,transparent)}
  .lane-head.l-tokens{color:var(--tokens)}.lane-head.l-atoms{color:var(--atoms)}
  .lane-head.l-molecules{color:var(--molecules)}.lane-head.l-organisms{color:var(--organisms)}.lane-head.l-motion{color:var(--motion)}
  /* active mode */
  .board.active .node{opacity:.14}
  .board.active .node.on{opacity:1}
  .node.sel{background:var(--c);color:#fff;border-color:var(--c);transform:scale(1.04);box-shadow:0 4px 16px color-mix(in srgb,var(--c) 40%,transparent)}
  .node.on:not(.sel){background:var(--cs)}
  .board.active path.wire{opacity:.03}
  path.wire.on{opacity:1;stroke:var(--c);stroke-width:1.6}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<header>
  <div>
    <h1>Design System <span>· Mapa de dependências</span></h1>
    <p id="status">Toque num nó pra ver a rede dele — o que ele consome e quem consome ele. Toque de novo pra limpar.</p>
  </div>
  <div class="legend">
    <b><span class="dot" style="background:var(--tokens)"></span>TOKENS</b>
    <b><span class="dot" style="background:var(--atoms)"></span>ÁTOMOS</b>
    <b><span class="dot" style="background:var(--molecules)"></span>MOLÉCULAS</b>
    <b><span class="dot" style="background:var(--organisms)"></span>ORGANISMOS</b>
    <b><span class="dot" style="background:var(--motion)"></span>MOTION</b>
  </div>
</header>

<div class="scroll" style="overflow-x:auto">
  <div class="board" id="board">
    <svg class="wires" id="wires"></svg>
  </div>
</div>

<script>
const DATA = {"nodes":[{"id":"bold_colors","label":"Colors","layer":"tokens"},{"id":"bold_gradients","label":"Gradients","layer":"tokens"},{"id":"bold_metrics","label":"Metrics","layer":"tokens"},{"id":"bold_typography","label":"Typography","layer":"tokens"},{"id":"bold_glass","label":"Glass","layer":"tokens"},{"id":"bold_theme","label":"Theme","layer":"tokens"},{"id":"bold_icon","label":"Icon","layer":"atoms"},{"id":"bold_logo","label":"Logo","layer":"atoms"},{"id":"bold_pix_mark","label":"PixMark","layer":"atoms"},{"id":"bold_background","label":"Background","layer":"atoms"},{"id":"bold_glass_surface","label":"GlassSurface","layer":"atoms"},{"id":"bold_home_indicator","label":"HomeIndicator","layer":"atoms"},{"id":"bold_page_dots","label":"PageDots","layer":"atoms"},{"id":"bold_glass_avatar","label":"GlassAvatar","layer":"atoms"},{"id":"bold_copy_button","label":"CopyButton","layer":"atoms"},{"id":"bold_skeleton","label":"Skeleton","layer":"atoms"},{"id":"bold_controls","label":"Controls","layer":"atoms"},{"id":"bold_checkbox","label":"Checkbox","layer":"atoms"},{"id":"bold_page_title","label":"PageTitle","layer":"molecules"},{"id":"bold_section_header","label":"SectionHeader","layer":"molecules"},{"id":"bold_button","label":"Button","layer":"molecules"},{"id":"bold_icon_button","label":"IconButton","layer":"molecules"},{"id":"bold_text_field","label":"TextField","layer":"molecules"},{"id":"bold_currency_field","label":"CurrencyField","layer":"molecules"},{"id":"bold_search_input","label":"SearchInput","layer":"molecules"},{"id":"bold_otp_input","label":"OtpInput","layer":"molecules"},{"id":"bold_keypad","label":"Keypad","layer":"molecules"},{"id":"bold_chip","label":"Chip","layer":"molecules"},{"id":"bold_status_tag","label":"StatusTag","layer":"molecules"},{"id":"bold_input_chip","label":"InputChip","layer":"molecules"},{"id":"bold_nav_top_bar","label":"NavTopBar","layer":"molecules"},{"id":"bold_stepper","label":"Stepper","layer":"molecules"},{"id":"bold_navigation_button","label":"NavigationButton","layer":"molecules"},{"id":"bold_card","label":"Card","layer":"molecules"},{"id":"bold_list","label":"List","layer":"molecules"},{"id":"bold_app_list","label":"AppList","layer":"molecules"},{"id":"bold_amount_display","label":"AmountDisplay","layer":"molecules"},{"id":"bold_detail_row","label":"DetailRow","layer":"molecules"},{"id":"bold_receipt","label":"Receipt","layer":"molecules"},{"id":"bold_progress_bar","label":"ProgressBar","layer":"molecules"},{"id":"bold_radio_list","label":"RadioList","layer":"molecules"},{"id":"bold_tooltip","label":"Tooltip","layer":"molecules"},{"id":"bold_quick_card","label":"MenuTile","layer":"molecules"},{"id":"bold_avatar_stack","label":"AvatarStack","layer":"molecules"},{"id":"bold_avatar_row","label":"AvatarRow","layer":"molecules"},{"id":"bold_empty_state","label":"EmptyState","layer":"molecules"},{"id":"bold_alert","label":"Alert","layer":"molecules"},{"id":"bold_app_bar","label":"AppBar","layer":"organisms"},{"id":"bold_balance","label":"Balance","layer":"organisms"},{"id":"bold_notice_row","label":"NoticeRow","layer":"organisms"},{"id":"bold_promo_banner","label":"PromoBanner","layer":"organisms"},{"id":"bold_promo_card","label":"PromoCard","layer":"organisms"},{"id":"bold_top_bar","label":"TopBar","layer":"organisms"},{"id":"bold_bottom_app","label":"BottomApp","layer":"organisms"},{"id":"bold_dialog","label":"Dialog","layer":"organisms"},{"id":"bold_quantum_pairing","label":"QuantumPairing","layer":"motion"},{"id":"bold_quantum_seal","label":"QuantumSeal","layer":"motion"}],"edges":[["bold_gradients","bold_colors"],["bold_glass","bold_colors"],["bold_theme","bold_colors"],["bold_theme","bold_typography"],["bold_theme","bold_metrics"],["bold_checkbox","bold_colors"],["bold_checkbox","bold_typography"],["bold_glass_surface","bold_colors"],["bold_glass_surface","bold_glass"],["bold_icon_button","bold_colors"],["bold_icon_button","bold_metrics"],["bold_icon_button","bold_icon"],["bold_app_bar","bold_colors"],["bold_app_bar","bold_typography"],["bold_app_bar","bold_metrics"],["bold_app_bar","bold_gradients"],["bold_app_bar","bold_icon"],["bold_top_bar","bold_colors"],["bold_top_bar","bold_typography"],["bold_top_bar","bold_metrics"],["bold_top_bar","bold_glass_surface"],["bold_top_bar","bold_icon"],["bold_top_bar","bold_nav_top_bar"],["bold_top_bar","bold_skeleton"],["bold_top_bar","bold_stepper"],["bold_status_tag","bold_colors"],["bold_status_tag","bold_typography"],["bold_status_tag","bold_icon"],["bold_progress_bar","bold_colors"],["bold_progress_bar","bold_typography"],["bold_skeleton","bold_colors"],["bold_copy_button","bold_colors"],["bold_copy_button","bold_typography"],["bold_copy_button","bold_icon"],["bold_card","bold_colors"],["bold_card","bold_metrics"],["bold_card","bold_glass"],["bold_navigation_button","bold_button"],["bold_input_chip","bold_colors"],["bold_input_chip","bold_glass"],["bold_input_chip","bold_metrics"],["bold_input_chip","bold_typography"],["bold_input_chip","bold_icon"],["bold_button","bold_colors"],["bold_button","bold_typography"],["bold_button","bold_metrics"],["bold_button","bold_icon"],["bold_quick_card","bold_colors"],["bold_quick_card","bold_metrics"],["bold_quick_card","bold_typography"],["bold_quick_card","bold_card"],["bold_quick_card","bold_icon"],["bold_balance","bold_colors"],["bold_balance","bold_metrics"],["bold_balance","bold_typography"],["bold_balance","bold_card"],["bold_balance","bold_icon"],["bold_balance","bold_skeleton"],["bold_balance","bold_status_tag"],["bold_background","bold_colors"],["bold_home_indicator","bold_colors"],["bold_home_indicator","bold_metrics"],["bold_dialog","bold_colors"],["bold_dialog","bold_typography"],["bold_dialog","bold_metrics"],["bold_dialog","bold_button"],["bold_detail_row","bold_colors"],["bold_detail_row","bold_typography"],["bold_detail_row","bold_metrics"],["bold_detail_row","bold_icon"],["bold_detail_row","bold_list"],["bold_otp_input","bold_colors"],["bold_otp_input","bold_metrics"],["bold_otp_input","bold_typography"],["bold_currency_field","bold_colors"],["bold_currency_field","bold_typography"],["bold_amount_display","bold_colors"],["bold_amount_display","bold_typography"],["bold_amount_display","bold_metrics"],["bold_bottom_app","bold_colors"],["bold_bottom_app","bold_glass"],["bold_bottom_app","bold_metrics"],["bold_bottom_app","bold_typography"],["bold_bottom_app","bold_glass_surface"],["bold_bottom_app","bold_home_indicator"],["bold_bottom_app","bold_keypad"],["bold_bottom_app","bold_navigation_button"],["bold_controls","bold_colors"],["bold_controls","bold_typography"],["bold_controls","bold_metrics"],["bold_promo_card","bold_colors"],["bold_promo_card","bold_metrics"],["bold_promo_card","bold_typography"],["bold_promo_card","bold_icon"],["bold_search_input","bold_colors"],["bold_search_input","bold_metrics"],["bold_search_input","bold_typography"],["bold_search_input","bold_icon"],["bold_text_field","bold_colors"],["bold_text_field","bold_typography"],["bold_text_field","bold_metrics"],["bold_text_field","bold_icon"],["bold_app_list","bold_colors"],["bold_app_list","bold_metrics"],["bold_app_list","bold_typography"],["bold_app_list","bold_app_bar"],["bold_app_list","bold_card"],["bold_app_list","bold_checkbox"],["bold_app_list","bold_controls"],["bold_app_list","bold_icon"],["bold_app_list","bold_icon_button"],["bold_app_list","bold_list"],["bold_nav_top_bar","bold_colors"],["bold_nav_top_bar","bold_typography"],["bold_nav_top_bar","bold_button"],["bold_nav_top_bar","bold_glass_avatar"],["bold_nav_top_bar","bold_icon"],["bold_nav_top_bar","bold_icon_button"],["bold_nav_top_bar","bold_input_chip"],["bold_tooltip","bold_colors"],["bold_tooltip","bold_typography"],["bold_glass_avatar","bold_colors"],["bold_glass_avatar","bold_glass"],["bold_glass_avatar","bold_typography"],["bold_icon","bold_colors"],["bold_icon","bold_metrics"],["bold_avatar_stack","bold_colors"],["bold_avatar_stack","bold_gradients"],["bold_avatar_stack","bold_typography"],["bold_list","bold_colors"],["bold_list","bold_typography"],["bold_list","bold_metrics"],["bold_list","bold_card"],["bold_list","bold_icon"],["bold_list","bold_status_tag"],["bold_keypad","bold_colors"],["bold_keypad","bold_typography"],["bold_promo_banner","bold_colors"],["bold_promo_banner","bold_metrics"],["bold_promo_banner","bold_typography"],["bold_promo_banner","bold_avatar_stack"],["bold_promo_banner","bold_button"],["bold_promo_banner","bold_icon"],["bold_receipt","bold_colors"],["bold_receipt","bold_typography"],["bold_receipt","bold_metrics"],["bold_receipt","bold_card"],["bold_receipt","bold_icon"],["bold_receipt","bold_list"],["bold_receipt","bold_logo"],["bold_stepper","bold_colors"],["bold_stepper","bold_typography"],["bold_notice_row","bold_colors"],["bold_notice_row","bold_metrics"],["bold_notice_row","bold_typography"],["bold_notice_row","bold_card"],["bold_notice_row","bold_icon"],["bold_section_header","bold_colors"],["bold_section_header","bold_typography"],["bold_quantum_seal","bold_typography"],["bold_alert","bold_colors"],["bold_alert","bold_glass"],["bold_alert","bold_typography"],["bold_alert","bold_metrics"],["bold_alert","bold_icon"],["bold_alert","bold_list"],["bold_chip","bold_colors"],["bold_chip","bold_typography"],["bold_chip","bold_metrics"],["bold_radio_list","bold_colors"],["bold_radio_list","bold_typography"],["bold_page_title","bold_colors"],["bold_page_title","bold_typography"],["bold_quantum_pairing","bold_colors"],["bold_quantum_pairing","bold_typography"],["bold_pix_mark","bold_colors"],["bold_pix_mark","bold_metrics"],["bold_pix_mark","bold_icon"],["bold_page_dots","bold_colors"],["bold_page_dots","bold_metrics"],["bold_avatar_row","bold_colors"],["bold_avatar_row","bold_gradients"],["bold_avatar_row","bold_typography"],["bold_avatar_row","bold_icon"],["bold_empty_state","bold_colors"],["bold_empty_state","bold_metrics"],["bold_empty_state","bold_typography"],["bold_empty_state","bold_card"],["bold_empty_state","bold_icon"]]};
const LAYERS = [
  ["tokens","Tokens"],["atoms","Átomos"],["molecules","Moléculas"],
  ["organisms","Organismos"],["motion","Motion"]
];
const byId = Object.fromEntries(DATA.nodes.map(n=>[n.id,n]));
// undirected adjacency
const adj = {}; DATA.nodes.forEach(n=>adj[n.id]=new Set());
DATA.edges.forEach(([c,d])=>{adj[c].add(d);adj[d].add(c);});

const board = document.getElementById("board");
const svg = document.getElementById("wires");
const status = document.getElementById("status");
const elOf = {};

// build lanes
LAYERS.forEach(([key,label])=>{
  const lane=document.createElement("div");
  lane.className="lane l-"+key;
  const head=document.createElement("div");
  head.className="lane-head l-"+key; head.textContent=label;
  lane.appendChild(head);
  DATA.nodes.filter(n=>n.layer===key).forEach(n=>{
    const b=document.createElement("button");
    b.className="node l-"+n.layer; b.textContent=n.label; b.dataset.id=n.id;
    b.addEventListener("click",e=>{e.stopPropagation();toggle(n.id);});
    b.addEventListener("mouseenter",()=>{if(!selected)paint(n.id,false);});
    b.addEventListener("mouseleave",()=>{if(!selected)clearPaint();});
    lane.appendChild(b); elOf[n.id]=b;
  });
  board.appendChild(lane);
});

// edges -> path elements (consumer = edge[0] carries the color)
const paths = DATA.edges.map(([c,d])=>{
  const p=document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("class","wire l-"+byId[c].layer);
  p.dataset.c=c; p.dataset.d=d;
  svg.appendChild(p); return p;
});

function anchors(a,b){ // a,b are DOM rects rel to board
  const dx=b.cx-a.cx;
  const aS=dx>=0?a.right:a.left, bS=dx>=0?b.left:b.right;
  return [aS,a.cy,bS,b.cy,dx];
}
function layout(){
  const br=board.getBoundingClientRect();
  svg.setAttribute("width",board.scrollWidth);
  svg.setAttribute("height",board.scrollHeight);
  svg.setAttribute("viewBox",`0 0 ${board.scrollWidth} ${board.scrollHeight}`);
  const R={};
  for(const id in elOf){const r=elOf[id].getBoundingClientRect();
    R[id]={cx:r.left-br.left+r.width/2,cy:r.top-br.top+r.height/2,left:r.left-br.left,right:r.left-br.left+r.width};}
  paths.forEach(p=>{
    const a=R[p.dataset.d], b=R[p.dataset.c]; // draw dependency -> consumer
    const [ax,ay,bx,by,dx]=anchors(a,b);
    const off=Math.max(46,Math.abs(bx-ax)*0.42);
    let d;
    if(Math.abs(a.cx-b.cx)<24){ // same lane: bulge sideways
      const s=90; d=`M${a.right} ${ay} C ${a.right+s} ${ay}, ${b.right+s} ${by}, ${b.right} ${by}`;
    } else {
      const s1=ax+ (bx>=ax?off:-off), s2=bx+ (bx>=ax?-off:off);
      d=`M${ax} ${ay} C ${s1} ${ay}, ${s2} ${by}, ${bx} ${by}`;
    }
    p.setAttribute("d",d);
  });
}

let selected=null;
function network(id){ // BFS undirected connected set
  const seen=new Set([id]),q=[id];
  while(q.length){const x=q.shift();adj[x].forEach(y=>{if(!seen.has(y)){seen.add(y);q.push(y);}});}
  return seen;
}
function paint(id,lock){
  const net=network(id);
  board.classList.add("active");
  for(const nid in elOf){elOf[nid].classList.toggle("on",net.has(nid));elOf[nid].classList.toggle("sel",lock&&nid===id);}
  paths.forEach(p=>{p.classList.toggle("on",net.has(p.dataset.c)&&net.has(p.dataset.d));});
  const n=byId[id];
  status.textContent=`Rede de "${n.label}" — ${net.size-1} nós conectados.` + (lock?" Toque de novo pra limpar.":"");
}
function clearPaint(){
  board.classList.remove("active");
  for(const nid in elOf){elOf[nid].classList.remove("on","sel");}
  paths.forEach(p=>p.classList.remove("on"));
  status.textContent='Toque num nó pra ver a rede dele — o que ele consome e quem consome ele. Toque de novo pra limpar.';
}
function toggle(id){ if(selected===id){selected=null;clearPaint();} else {selected=id;paint(id,true);} }
board.addEventListener("click",()=>{if(selected){selected=null;clearPaint();}});

const _l=()=>requestAnimationFrame(layout);
window.addEventListener("resize",_l);
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(_l);
_l(); setTimeout(layout,120); setTimeout(layout,400);
</script>
